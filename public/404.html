<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена | GeoSana</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: #020617;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      .bg-gradient {
        position: absolute;
        width: 150vw;
        height: 150vh;
        background: radial-gradient(circle at center, rgba(14, 165, 233, 0.15) 0%, transparent 50%);
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(20px);
        padding: 4rem 3rem;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        max-width: 90%;
      }
      h1 { font-size: 6rem; margin: 0; color: #0ea5e9; text-shadow: 0 0 30px rgba(14, 165, 233, 0.4); line-height: 1; }
      h2 { font-size: 1.5rem; margin: 1rem 0 2rem; }
      a {
        display: inline-block;
        background: linear-gradient(135deg, #0ea5e9, #2563eb);
        color: white;
        text-decoration: none;
        padding: 1rem 2rem;
        border-radius: 99px;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(14, 165, 233, 0.4);
      }
    </style>
    <script type="text/javascript">
      // Basic fallback for SPAs if manual navigation happens
      const path = window.location.pathname;
      if (path.startsWith('/-') && path !== '/-/') {
        const redirect = setTimeout(() => {
          window.location.href = '/-/';
        }, 3000);
      }
    </script>
  </head>
  <body>
    <div class="bg-gradient"></div>
    <div class="container">
      <h1>404</h1>
      <h2>Упс! Эта страница потерялась на карте.</h2>
      <p style="color: #94a3b8; margin-bottom: 2rem;">Похоже, вы забрели в неисследованный регион.</p>
      <a href="/-/" onclick="window.location.href=window.location.pathname.startsWith('/-') ? '/-/' : '/'; return false;">
        Вернуться на главную
      </a>
    </div>
  </body>
</html>
