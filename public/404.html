<!DOCTYPE html>
<html>

    <meta charset="utf-8">
    <title>GeoSana</title>
    <script type="text/javascript">
      // Redirect to the main site if someone hits a non-existent path
      // This is a common workaround for SPAs on GitHub Pages subfolders
      window.location.href = window.location.pathname.startsWith('/-') ? '/-/' : '/-/';
    </script>
  </head>

    Redirecting to <a href="/-/">GeoSana</a>...
  </body>
